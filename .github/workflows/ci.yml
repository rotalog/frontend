name: Web CI

on:
  pull_request:
    branches:
      - main
      - development
      - develop
  push:
    branches:
      - main
      - development
      - develop
      - feature/**
      - fix/**

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Build web app
        run: npm run build
