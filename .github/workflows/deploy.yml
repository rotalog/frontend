name: Web Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: rotalog-web-production
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Build web app
        run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: verify
    environment: production

    steps:
      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          : "${VPS_HOST:?Missing VPS_HOST secret}"
          : "${VPS_SSH_KEY:?Missing VPS_SSH_KEY secret}"

          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/rotalog_deploy_key
          chmod 600 ~/.ssh/rotalog_deploy_key
          ssh-keyscan -p "${VPS_PORT:-22}" -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy web on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -euo pipefail
          : "${VPS_HOST:?Missing VPS_HOST secret}"
          : "${VPS_USER:?Missing VPS_USER secret}"

          ssh -i ~/.ssh/rotalog_deploy_key -p "${VPS_PORT:-22}" "$VPS_USER@$VPS_HOST" 'bash -se' <<'EOF'
          set -euo pipefail

          cd /opt/rotalog/rotalog-web
          git fetch origin main
          if git show-ref --verify --quiet refs/heads/main; then
            git checkout main
          else
            git checkout -b main origin/main
          fi
          git pull --ff-only origin main

          cd /opt/rotalog/infra
          docker compose -f docker-compose.prod.yml up -d --build web
          docker compose -f docker-compose.prod.yml ps web
          EOF
